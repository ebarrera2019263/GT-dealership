services:
  postgres:
    image: postgres:16-alpine
    container_name: concesionario-postgres
    environment:
      POSTGRES_USER: concesionario
      POSTGRES_PASSWORD: concesionario
      POSTGRES_DB: concesionario
    ports:
      # 5433 en el host: el 5432 lo ocupa un Postgres nativo de esta máquina
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concesionario"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: concesionario-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
